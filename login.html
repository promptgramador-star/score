<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Torneo Exalumnos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      font-family: 'Barlow Condensed', sans-serif;
      background: #0a0a0a;
      color: #f5f5f5;
      letter-spacing: 0.02em;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background:
        radial-gradient(circle at 20% 10%, rgba(245, 158, 11, 0.18), transparent 40%),
        radial-gradient(circle at 80% 90%, rgba(245, 158, 11, 0.08), transparent 35%),
        #0a0a0a;
    }
    .login-card {
      width: 100%;
      max-width: 420px;
      background: #131313;
      border: 1px solid #262626;
      border-radius: 16px;
      padding: 40px 32px;
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.5);
    }
    .logo {
      text-align: center;
      margin-bottom: 28px;
    }
    .logo-mark {
      display: inline-flex;
      width: 64px;
      height: 64px;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #f59e0b 0%, #ea580c 100%);
      border-radius: 16px;
      font-size: 32px;
      font-weight: 800;
      color: #0a0a0a;
      margin-bottom: 16px;
      box-shadow: 0 8px 24px rgba(245, 158, 11, 0.35);
    }
    .logo h1 {
      font-size: 28px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      line-height: 1;
    }
    .logo .subtitle {
      margin-top: 6px;
      color: #a3a3a3;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 0.2em;
    }
    form { display: flex; flex-direction: column; gap: 16px; }
    .field { display: flex; flex-direction: column; gap: 6px; }
    label {
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: #a3a3a3;
      font-weight: 600;
    }
    input[type="email"], input[type="password"] {
      background: #0a0a0a;
      border: 1px solid #262626;
      color: #f5f5f5;
      padding: 12px 14px;
      border-radius: 10px;
      font-size: 16px;
      font-family: inherit;
      transition: border-color 0.15s, background 0.15s;
    }
    input[type="email"]:focus, input[type="password"]:focus {
      outline: none;
      border-color: #f59e0b;
      background: #111;
    }
    button[type="submit"] {
      margin-top: 8px;
      background: #f59e0b;
      color: #0a0a0a;
      border: none;
      padding: 14px;
      font-size: 17px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      border-radius: 10px;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s, transform 0.05s;
    }
    button[type="submit"]:hover:not(:disabled) { background: #fbbf24; }
    button[type="submit"]:active:not(:disabled) { transform: translateY(1px); }
    button[type="submit"]:disabled { opacity: 0.6; cursor: not-allowed; }
    .error-banner {
      display: none;
      background: rgba(220, 38, 38, 0.1);
      border: 1px solid rgba(220, 38, 38, 0.5);
      color: #fca5a5;
      padding: 12px 14px;
      border-radius: 10px;
      font-size: 15px;
      margin-top: 4px;
    }
    .error-banner.show { display: block; }
    .footer {
      margin-top: 24px;
      text-align: center;
      font-size: 13px;
      color: #6b7280;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="logo">
      <div class="logo-mark">🏀</div>
      <h1>Torneo Exalumnos</h1>
      <div class="subtitle">Panel de control</div>
    </div>

    <form id="loginForm" autocomplete="on">
      <div class="field">
        <label for="email">Correo electrónico</label>
        <input type="email" id="email" name="email" required autocomplete="email" placeholder="tu@correo.com" />
      </div>
      <div class="field">
        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="••••••••" />
      </div>

      <div class="error-banner" id="errorBanner"></div>

      <button type="submit" id="submitBtn">Entrar</button>
    </form>

    <div class="footer">v1.0 · Acceso restringido</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-client.js"></script>
  <script>
    const form = document.getElementById('loginForm');
    const errorBanner = document.getElementById('errorBanner');
    const submitBtn = document.getElementById('submitBtn');

    function showError(msg) {
      errorBanner.textContent = msg;
      errorBanner.classList.add('show');
    }
    function clearError() {
      errorBanner.textContent = '';
      errorBanner.classList.remove('show');
    }

    // Redirige si ya hay sesión
    (async () => {
      try {
        const session = await getSession();
        if (session) window.location.href = 'manage.html';
      } catch (e) {
        console.warn('Error chequeando sesión:', e);
      }
    })();

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearError();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      if (!email || !password) {
        showError('Completa email y contraseña.');
        return;
      }
      submitBtn.disabled = true;
      submitBtn.textContent = 'Entrando…';
      try {
        await signIn(email, password);
        window.location.href = 'manage.html';
      } catch (err) {
        const msg = (err?.message || '').toLowerCase();
        if (msg.includes('invalid')) {
          showError('Credenciales incorrectas. Verifica email y contraseña.');
        } else if (msg.includes('email')) {
          showError('Correo no válido o no confirmado.');
        } else {
          showError(err?.message || 'No se pudo iniciar sesión.');
        }
        submitBtn.disabled = false;
        submitBtn.textContent = 'Entrar';
      }
    });
  </script>
</body>
</html>
